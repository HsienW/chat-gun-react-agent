  <text class="small" x="1125" y="1232" text-anchor="middle">@langchain/google-genai</text>
  <rect class="card" x="1335" y="1150" width="280" height="130" />
  <text class="label" x="1475" y="1198" text-anchor="middle">LangSmith</text>
  <text class="small" x="1475" y="1232" text-anchor="middle">optional tracing</text>

  <rect class="panel" x="1815" y="1040" width="700" height="360" />
  <text class="panel-title" x="2165" y="1080" text-anchor="middle">MCP Servers / Tools</text>
  <rect class="card" x="1880" y="1145" width="255" height="135" />
  <text class="label" x="2008" y="1190" text-anchor="middle">Filesystem MCP</text>
  <text class="small" x="2008" y="1224" text-anchor="middle">file operations</text>
  <rect class="card" x="2188" y="1145" width="255" height="135" />
  <text class="label" x="2316" y="1190" text-anchor="middle">Brave Search MCP</text>
  <text class="small" x="2316" y="1224" text-anchor="middle">optional web search</text>
  <rect class="card-alt" x="2030" y="1305" width="270" height="72" />
