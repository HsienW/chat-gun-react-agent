volumes:
  langgraph-data:
    driver: local
services:
  langgraph-redis:
    image: docker.io/redis:6
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5
  langgraph-postgres:
    image: docker.io/postgres:16
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - langgraph-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s
  langgraph-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: langgraph-api
    image: chat-gun-react-agent
    expose:
      - '8000'
    depends_on:
      langgraph-redis:
        condition: service_healthy
      langgraph-postgres:
        condition: service_healthy
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      REDIS_URI: redis://langgraph-redis:6379
      POSTGRES_URI: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable
      # MCP 設定
      MCP_LOAD_ON_START: ${MCP_LOAD_ON_START}
      DEEP_RESEARCHER_MCP_ENABLED: ${DEEP_RESEARCHER_MCP_ENABLED}
      MCP_FILESYSTEM_ENABLED: ${MCP_FILESYSTEM_ENABLED}
      MCP_FILESYSTEM_PATH: ${MCP_FILESYSTEM_PATH}
      MCP_BRAVE_SEARCH_ENABLED: ${MCP_BRAVE_SEARCH_ENABLED}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
  bff:
    build:
      context: .
      dockerfile: Dockerfile
      target: bff
    image: chat-gun-react-agent-bff
    ports:
      - '8123:8000'
    depends_on:
      - langgraph-api
    environment:
      BFF_PORT: 8000
      BFF_LANGGRAPH_API_URL: http://langgraph-api:8000
      BFF_ALLOWED_ORIGINS: ${BFF_ALLOWED_ORIGINS:-}
      BFF_REQUIRE_AUTH: ${BFF_REQUIRE_AUTH:-false}
      BFF_API_KEYS: ${BFF_API_KEYS:-}
      BFF_MAX_BODY_BYTES: ${BFF_MAX_BODY_BYTES:-1048576}
      BFF_UPSTREAM_TIMEOUT_MS: ${BFF_UPSTREAM_TIMEOUT_MS:-120000}
      BFF_RATE_LIMIT_WINDOW_MS: ${BFF_RATE_LIMIT_WINDOW_MS:-60000}
      BFF_RATE_LIMIT_MAX_REQUESTS: ${BFF_RATE_LIMIT_MAX_REQUESTS:-120}
